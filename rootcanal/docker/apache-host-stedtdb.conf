# ============================================================================
# Host Apache2 virtual-host – EC2 production
#
# SSL is terminated by the AWS Application Load Balancer upstream.
# This file handles plain HTTP only.
#
# Install on the EC2 instance:
#   sudo cp apache-host-stedtdb.conf /etc/apache2/sites-available/stedtdb.conf
#   sudo a2enmod proxy proxy_http headers
#   sudo a2ensite stedtdb
#   sudo a2dissite 000-default      # optional: removes the Apache placeholder page
#   sudo apache2ctl configtest      # should print "Syntax OK"
#   sudo systemctl reload apache2
#
# Traffic flow:
#   Browser → ALB (HTTPS:443) → EC2 host Apache (HTTP:80) → container (HTTP:8080)
#
# The ALB sets X-Forwarded-Proto: https automatically.  The container's Apache
# converts that header into HTTPS=on for CGI scripts so that CGI.pm generates
# correct https:// links (password-reset emails, post-login redirects, etc.).
# ============================================================================

<VirtualHost *:80>
    ServerName  stedtdb.johnblowe.com
    ServerAdmin webmaster@johnblowe.com

    # ── Proxy to Docker container ─────────────────────────────────────────────
    # The container is bound to 127.0.0.1:8080 and is NOT reachable from the
    # internet directly — only this VirtualHost can talk to it.
    ProxyPreserveHost On
    ProxyPass        / http://127.0.0.1:8080/
    ProxyPassReverse / http://127.0.0.1:8080/

    # ── Logging ───────────────────────────────────────────────────────────────
    ErrorLog  /var/log/apache2/stedtdb-error.log
    CustomLog /var/log/apache2/stedtdb-access.log combined
</VirtualHost>
