# ============================================================================
# Apache 2 virtual-host configuration for STEDT RootCanal
#
# rootcanal.pl is a CGI::Application::Dispatch script that handles all
# dynamic routes via PATH_INFO (e.g. /rootcanal.pl/etymon/123).
# A mod_rewrite rule transparently strips the script name so that
# http://host/etymon/123  is served without exposing "rootcanal.pl" in
# the URL – exactly as the original server was configured.
# ============================================================================

<VirtualHost *:80>
    ServerName  localhost
    ServerAdmin webmaster@localhost
    DocumentRoot /home/stedt-cgi/public_html

    # Tell Perl where the custom STEDT:: modules live.
    # This supplements (and effectively replaces) the BEGIN { unshift @INC … }
    # trick in rootcanal.pl, which relies on the CWD being the script directory
    # – something Apache does not guarantee under mod_cgi.
    SetEnv PERL5LIB /home/stedt-cgi/pm

    # When the host reverse-proxy forwards X-Forwarded-Proto: https, set the
    # HTTPS env variable so CGI.pm's url() generates https:// links correctly
    # (e.g. the password-reset email, post-login redirects, etc.).
    # This directive is harmless during local testing: without a proxy the
    # header is absent and HTTPS is simply not set.
    SetEnvIf X-Forwarded-Proto https HTTPS=on

    # ── Document root ─────────────────────────────────────────────────────────
    <Directory /home/stedt-cgi/public_html>
        Options +ExecCGI -Indexes
        AllowOverride None
        Require all granted

        # PATH_INFO must reach the CGI script intact so that
        # CGI::Application::Dispatch can parse it into app/runmode segments.
        AcceptPathInfo On
    </Directory>

    # ── Execute .pl and .cgi files as CGI scripts ─────────────────────────────
    <FilesMatch "\.(pl|cgi)$">
        SetHandler cgi-script
    </FilesMatch>

    # ── Block direct retrieval of Template Toolkit source files ───────────────
    # The .tt files are server-side templates; they should never be downloaded.
    <FilesMatch "\.tt$">
        Require all denied
    </FilesMatch>

    # ── URL rewriting ─────────────────────────────────────────────────────────
    # Goal: http://host/etymon/123  →  internally /rootcanal.pl/etymon/123
    #       http://host/styles/rootcanal.css  →  served as a static file
    #       http://host/rootcanal.pl  →  served directly (no rewrite needed)
    #       http://host/lg_table.cgi  →  served directly
    RewriteEngine On

    # 1. Pass through anything that already exists on disk (static assets,
    #    the CGI scripts themselves, etc.)
    RewriteCond %{REQUEST_FILENAME} -f
    RewriteRule ^ - [L]

    # 2. Rewrite everything else to rootcanal.pl/<original path> so that
    #    CGI::Application::Dispatch receives it as PATH_INFO.
    #    PT (passthrough) keeps the handler as cgi-script.
    RewriteRule ^/(.+)$ /rootcanal.pl/$1 [L,PT]

    # 3. Bare "/" → rootcanal.pl (dispatch table maps "" → Search/splash)
    RewriteRule ^/$ /rootcanal.pl [L,PT]

    # ── Logging ───────────────────────────────────────────────────────────────
    ErrorLog  ${APACHE_LOG_DIR}/rootcanal-error.log
    CustomLog ${APACHE_LOG_DIR}/rootcanal-access.log combined
</VirtualHost>
